version: '3.8'

services:
  tw2outline:
    image: ghcr.io/korjavin/tw2outline:sha-00ba64f
    container_name: tw2outline
    restart: unless-stopped
    networks:
      - vaultwarden_default
    environment:
      - OUTLINE_URL=${OUTLINE_URL}
      - OUTLINE_API_TOKEN=${OUTLINE_API_TOKEN}
      - OUTLINE_COLLECTION_ID=${OUTLINE_COLLECTION_ID}
      - TWITTER_CLIENT_ID=${TWITTER_CLIENT_ID}
      - TWITTER_CLIENT_SECRET=${TWITTER_CLIENT_SECRET}
      - TWITTER_REDIRECT_URL=${TWITTER_REDIRECT_URL:-http://localhost:8080/callback}
      - TW_USER=${TW_USER}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-1h}
      - TOKEN_FILE_PATH=/app/data/token.json
      - CACHE_FILE_PATH=/app/data/cache.json
      - REMOVE_BOOKMARKS=${REMOVE_BOOKMARKS:-false}
      - CLEANUP_PROCESSED_BOOKMARKS=${CLEANUP_PROCESSED_BOOKMARKS:-false}
      - CALLBACK_PORT=${CALLBACK_PORT:-8080}
      - NTFY_SERVER=${NTFY_SERVER:-}
      - NTFY_TOPIC=${NTFY_TOPIC:-tw2outline}
      - NTFY_USERNAME=${NTFY_USERNAME}
      - NTFY_PASSWORD=${NTFY_PASSWORD}
    volumes:
      - tw2outline_data:/app/data
    ports:
      - "${CALLBACK_PORT:-8080}:${CALLBACK_PORT:-8080}"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "tw2outline"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.tw2outline.rule=Host(`${TW2OUTLINE_DOMAIN}`)"
      - "traefik.http.routers.tw2outline.entrypoints=websecure"
      - "traefik.http.routers.tw2outline.tls.certresolver=myresolver"
      - "traefik.http.services.tw2outline.loadbalancer.server.port=${CALLBACK_PORT:-8080}"
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  tw2outline_data:

networks:
  vaultwarden_default:
    external: true
