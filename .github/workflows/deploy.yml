name: Build and Deploy to Portainer

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4.2.2

      - name: ⚙️ Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: '1.23'

      - name: 🔬 Run tests
        run: go test ./...

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: 🔨 Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📝 Update and commit docker-compose.yml
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git checkout -B deploy

          sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:sha-${GITHUB_SHA:0:7}|g" docker-compose.yml

          git add docker-compose.yml
          git commit -m "ci: Update image tag to sha-${GITHUB_SHA:0:7}"
          git push origin deploy --force

      - name: 🚀 Trigger Portainer Redeploy Webhook
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
